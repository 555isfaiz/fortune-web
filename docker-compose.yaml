services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: fortune
      POSTGRES_USER: fortune
      POSTGRES_PASSWORD: fortune
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fortune"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/fortune
      QUARKUS_DATASOURCE_USERNAME: fortune
      QUARKUS_DATASOURCE_PASSWORD: fortune
    ports:
      - "8080:8080"

volumes:
  pgdata:
